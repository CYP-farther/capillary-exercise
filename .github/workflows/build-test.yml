name: Build and Test

# 触发条件：推送到 main、或针对 main 的 PR
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test:
    # 项目是 WinForms（net9.0-windows），必须用 Windows runner
    runs-on: windows-latest

    steps:
      # 1. 拉取代码
      - name: Checkout
        uses: actions/checkout@v4

      # 2. 安装 .NET 9 SDK
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      # 3. 还原依赖
      - name: Restore
        run: dotnet restore

      # 4. 编译（Release 配置）
      - name: Build
        run: dotnet build --configuration Release --no-restore

      # 5. 运行测试（全部）
      #    本项目的测试全程进程内：单元（NSubstitute Mock）、Repository（临时 SQLite）、
      #    端到端（真实 Service + Fake + SQLite，不启动 WinForms 界面）。
      #    都不依赖真实硬件或显示设备，可在 CI runner 上原生跑通，因此不做筛选。
      - name: Test
        run: dotnet test --configuration Release --no-build

# 说明：
# - 单元测试（PickupService，用 NSubstitute Mock 依赖）→ CI 可跑
# - Repository 测试（SQLite 临时库，无需额外驱动）→ CI 可跑
# - 端到端测试（进程内组装 Service + Fake + SQLite，无界面）→ CI 可跑
# 这样 CI 保证"编译通过 + 全部测试通过"，作为合并的最低门槛。
